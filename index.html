 <!DOCTYPE html>
 <html lang="fa" dir="rtl">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xigma Mobile </title>
    <link rel="stylesheet" href="css/style.css">
 </head>

 <body>
    <!--Header-->

    <header>
        <div class="logo">
            Xigma Mobile
        </div>
        <nav>
            <a href="#">خانه</a>
            <a href="#">محصولات</a>
            <a href="#">برندها</a>
            <a href="#">تماس</a>
        </nav>
        <div class="icons">
            $
            $
            $
        </div>
    </header>

    <!-- Hero -->

    <section class="Hero">
        <div class="hero-text">
            <h1>Xigma Mobile</h1>
            <h2>دنیای گوشی های هوشمند</h2>
            <p>
                جدیدترین گوشی های اپل سامسونگ و شیایومی با بهترین قیمت
            </p>
            <div class="hero-buttons">
                <button class="btn-primary">مشاهده محصولات</button>
                <button class="btn-secondary">درباره ما</button>
            </div>
        </div>
        <div class="hero-image">
            <img src="hero-phone.jpg" alt="phone">
        </div>
    </section>

    <!-- Products -->

    <section class="Products">
        <h2>محصولات ویژه</h2>

        <div class="Product-container">
            <div class="card">
                <img src="images/iphone.webp" alt="iphone">
                <h3>iphone 16 pro max</h3>
                <p class="price">98/000/000</p>
                <button>مشاهده محصولات</button>

            </div>
        <div class="card">
            <img src="images/s24.jpg" alt="Samsung">
            <h3>Samsung S24 Ultra</h3>
            <p class="price">74/000/000</p>
            <button>مشاهده محصولات</button>

        </div>
        <div class="card">
            <img src="images/xiaomi15.jpg" alt="Xiaomi">
            <h3>Xiaomi 15 pro</h3>
            <p class="price">45/000/000</p>
            <button>مشاهده محصولات</button>
        </div>
    </section>
    
 </body>
 </html>
